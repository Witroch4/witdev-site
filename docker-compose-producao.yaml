# docker-compose-producao.yaml
# ================================================
# Compose de PRODUÇÃO — Deploy via Portainer (Docker Swarm)
# Segue o padrão WitDev com Traefik + minha_rede
# ================================================
#
# Para deployar via Portainer:
#   1. Abrir Portainer > Stacks > Add Stack
#   2. Colar o conteúdo deste arquivo
#   3. Confirmar deploy
#
# Pré-requisitos no Swarm:
#   - Rede externa "minha_rede" criada:
#     docker network create --driver overlay minha_rede
#   - Traefik rodando com entrypoints websecure e certresolver "letsencryptresolver"
#
# ================================================

version: "3.8"

services:
  witdev_site:
    image: witrocha/witdev-site:latest
    networks:
      - minha_rede
    environment:
      NODE_ENV: "production"
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: "postgresql://witdev_analytics:witdev_analytics_2026@witdev_postgres:5432/witdev_analytics"
      JWT_SECRET: "z7L9*mP2qX5%vR4!wT8$kH3@jN6&cK1^yA"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        # ---- Traefik: habilitar roteamento ----------------------------
        - "traefik.enable=true"

        # ---- Rota HTTPS principal ------------------------------------
        - "traefik.http.routers.witdev_site.rule=Host(`witdev.com.br`) || Host(`www.witdev.com.br`)"
        - "traefik.http.routers.witdev_site.entrypoints=websecure"
        - "traefik.http.routers.witdev_site.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.witdev_site.priority=1"

        # ---- Serviço (porta interna do container) --------------------
        - "traefik.http.services.witdev_site.loadbalancer.server.port=3000"
        - "traefik.http.services.witdev_site.loadbalancer.passHostHeader=true"

        # ---- Middlewares de segurança HTTP ---------------------------
        - "traefik.http.routers.witdev_site.middlewares=witdev_site_secure@swarm"
        - "traefik.http.middlewares.witdev_site_secure.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.witdev_site_secure.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.witdev_site_secure.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.witdev_site_secure.headers.browserXssFilter=true"
        - "traefik.http.middlewares.witdev_site_secure.headers.referrerPolicy=strict-origin-when-cross-origin"

        # ---- Redirect HTTP → HTTPS -----------------------------------
        - "traefik.http.routers.witdev_site_http.rule=Host(`witdev.com.br`) || Host(`www.witdev.com.br`)"
        - "traefik.http.routers.witdev_site_http.entrypoints=web"
        - "traefik.http.routers.witdev_site_http.middlewares=redirect_https@swarm"
        - "traefik.http.middlewares.redirect_https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.redirect_https.redirectscheme.permanent=true"

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

# ------------------------------------------------
# Infraestrutura — Banco de Dados Analytics
# ------------------------------------------------
  witdev_postgres:
    image: postgres:15-alpine
    networks:
      - minha_rede
    environment:
      POSTGRES_USER: witdev_analytics
      POSTGRES_PASSWORD: witdev_analytics_2026
      POSTGRES_DB: witdev_analytics
    volumes:
      - witdev_pg_data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

# ------------------------------------------------
# Infraestrutura — Rede externa compartilhada
# ------------------------------------------------
networks:
  minha_rede:
    external: true
    name: minha_rede

volumes:
  witdev_pg_data:
