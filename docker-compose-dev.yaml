# docker-compose-dev.yaml
# ================================================
# Compose para rodar o ambiente de desenvolvimento
# ================================================
version: "3.8"

services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"

volumes:
  node_modules:
  next_cache:
